<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AEROVISION — 实时目标检测</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-deep: #050506;
      --bg-panel: rgba(12, 12, 14, 0.72);
      --border: rgba(255, 255, 255, 0.06);
      --border-strong: rgba(255, 255, 255, 0.12);
      --text: #f4f4f5;
      --text-dim: #8b8b93;
      --accent: #c8ff3d;
      --accent-soft: rgba(200, 255, 61, 0.15);
      --warn: #ffb84d;
      --danger: #ff5c5c;
      --glow: rgba(200, 255, 61, 0.08);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", system-ui, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Ambient gradient mesh — Runway-like depth */
    .ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(200, 255, 61, 0.07), transparent 50%),
        radial-gradient(ellipse 60% 40% at 90% 100%, rgba(120, 80, 255, 0.06), transparent 45%),
        radial-gradient(ellipse 50% 30% at 50% 50%, rgba(255, 255, 255, 0.02), transparent 60%);
    }

    .noise {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      opacity: 0.35;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      mix-blend-mode: overlay;
    }

    .shell {
      position: relative;
      z-index: 2;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      background: rgba(5, 5, 6, 0.6);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
    }

    .brand-mark {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .brand-sub {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 2rem;
    }

    nav a {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }

    nav a:hover {
      color: var(--text);
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border-strong);
      font-size: 0.75rem;
      font-weight: 500;
      background: var(--bg-panel);
    }

    .pill-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 12px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn-ghost {
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .btn-ghost:hover {
      border-color: var(--border-strong);
      background: rgba(255, 255, 255, 0.03);
    }

    .btn-primary {
      padding: 0.5rem 1.15rem;
      border-radius: 6px;
      border: none;
      background: var(--text);
      color: var(--bg-deep);
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.12);
    }

    /* Main layout */
    main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr minmax(280px, 360px);
      gap: 0;
      min-height: calc(100vh - 73px);
    }

    @media (max-width: 960px) {
      main {
        grid-template-columns: 1fr;
      }
      nav { display: none; }
    }

    .feed-wrap {
      position: relative;
      border-right: 1px solid var(--border);
      min-height: 420px;
    }

    .feed-header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 5;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 1.25rem 1.5rem;
      pointer-events: none;
    }

    .feed-tag {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: rgba(0, 0, 0, 0.45);
      padding: 0.35rem 0.65rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      pointer-events: auto;
    }

    .feed-stats {
      display: flex;
      gap: 0.75rem;
      pointer-events: auto;
    }

    .stat-chip {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
      color: var(--text);
      background: rgba(0, 0, 0, 0.5);
      padding: 0.4rem 0.7rem;
      border-radius: 4px;
      border: 1px solid var(--border);
    }

    .stat-chip span {
      color: var(--accent);
    }

    /* Simulated video / drone feed */
    .feed {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(165deg, #0c0e12 0%, #151820 40%, #0a0c10 100%);
      overflow: hidden;
    }

    .feed::before {
      content: "";
      position: absolute;
      inset: -20%;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(80, 120, 200, 0.12), transparent 55%),
        radial-gradient(ellipse at 70% 80%, rgba(200, 255, 61, 0.06), transparent 50%);
    }

    .scanline {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0, 0, 0, 0.12) 2px,
        rgba(0, 0, 0, 0.12) 3px
      );
      pointer-events: none;
      opacity: 0.4;
    }

    .feed-vignette {
      position: absolute;
      inset: 0;
      box-shadow: inset 0 0 120px rgba(0, 0, 0, 0.65);
      pointer-events: none;
    }

    /* Fake bounding boxes */
    .detections-layer {
      position: absolute;
      inset: 8%;
      pointer-events: none;
    }

    .box {
      position: absolute;
      border: 1px solid var(--accent);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.5),
        0 0 20px var(--accent-soft);
      border-radius: 2px;
    }

    .box::after {
      content: attr(data-label);
      position: absolute;
      left: -1px;
      bottom: 100%;
      margin-bottom: 4px;
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.6rem;
      padding: 0.2rem 0.45rem;
      background: var(--accent);
      color: #0a0a0a;
      font-weight: 500;
      white-space: nowrap;
    }

    .box-1 { width: 22%; height: 18%; left: 18%; top: 35%; animation: boxFloat 6s ease-in-out infinite; }
    .box-2 { width: 14%; height: 12%; left: 58%; top: 22%; animation: boxFloat 7s ease-in-out infinite 0.5s; }
    .box-3 { width: 10%; height: 14%; left: 72%; top: 58%; animation: boxFloat 5.5s ease-in-out infinite 1s; }

    @keyframes boxFloat {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(3px, -4px); }
    }

    .crosshair {
      position: absolute;
      width: 48px;
      height: 48px;
      left: 50%;
      top: 48%;
      transform: translate(-50%, -50%);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 50%;
      opacity: 0.6;
    }

    .crosshair::before,
    .crosshair::after {
      content: "";
      position: absolute;
      background: rgba(255, 255, 255, 0.2);
    }

    .crosshair::before {
      left: 50%;
      top: 0;
      bottom: 0;
      width: 1px;
      transform: translateX(-50%);
    }

    .crosshair::after {
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      transform: translateY(-50%);
    }

    .feed-footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.75));
      z-index: 5;
    }

    .timeline {
      flex: 1;
      max-width: 55%;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin-right: 1.5rem;
      position: relative;
      overflow: hidden;
    }

    .timeline-fill {
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 67%;
      background: linear-gradient(90deg, var(--accent), rgba(200, 255, 61, 0.4));
      border-radius: 2px;
    }

    .coords {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
      letter-spacing: 0.04em;
    }

    /* Sidebar */
    aside {
      display: flex;
      flex-direction: column;
      background: rgba(8, 8, 10, 0.5);
      backdrop-filter: blur(16px);
    }

    .aside-head {
      padding: 1.5rem 1.5rem 1rem;
      border-bottom: 1px solid var(--border);
    }

    .aside-title {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.35rem;
      font-weight: 400;
      margin: 0 0 0.35rem;
      letter-spacing: -0.02em;
    }

    .aside-desc {
      margin: 0;
      font-size: 0.8125rem;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding: 1rem 1.5rem;
    }

    .chip {
      padding: 0.35rem 0.75rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 500;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: default;
      transition: all 0.2s;
    }

    .chip.on {
      border-color: var(--accent);
      color: var(--text);
      background: var(--accent-soft);
    }

    .list {
      flex: 1;
      overflow-y: auto;
      padding: 0 1.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }

    .card {
      padding: 1rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-panel);
      transition: border-color 0.2s;
    }

    .card:hover {
      border-color: var(--border-strong);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.65rem;
    }

    .card-name {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .card-id {
      font-family: "IBM Plex Mono", monospace;
      font-size: 0.65rem;
      color: var(--text-dim);
    }

    .meter {
      height: 3px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), rgba(200, 255, 61, 0.5));
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      margin-top: 0.5rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      font-family: "IBM Plex Mono", monospace;
    }

    .aside-foot {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .aside-foot strong {
      color: var(--warn);
      font-weight: 500;
    }

    /* Bottom strip */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1px;
      background: var(--border);
      border-top: 1px solid var(--border);
    }

    .metric {
      padding: 1rem 1.5rem;
      background: var(--bg-deep);
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .metric-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 500;
    }

    .metric-value {
      font-family: "IBM Plex Mono", monospace;
      font-size: 1.1rem;
      font-weight: 500;
    }

    @media (max-width: 960px) {
      .metrics {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>
  <div class="noise" aria-hidden="true"></div>

  <div class="shell">
    <header>
      <div class="brand">
        <span class="brand-mark">AEROVISION</span>
        <span class="brand-sub">Live</span>
      </div>
      <nav>
        <a href="#">控制台</a>
        <a href="#">任务</a>
        <a href="#">模型</a>
        <a href="#">日志</a>
      </nav>
      <div class="header-actions">
        <div class="pill">
          <span class="pill-dot" aria-hidden="true"></span>
          链路已连接
        </div>
        <button type="button" class="btn-ghost">设置</button>
        <button type="button" class="btn-primary">导出报告</button>
      </div>
    </header>

    <main>
      <section class="feed-wrap" aria-label="实时视频流">
        <div class="feed-header">
          <span class="feed-tag">CAM-01 · 前视 · 1080p</span>
          <div class="feed-stats">
            <span class="stat-chip">FPS <span>29.8</span></span>
            <span class="stat-chip">延迟 <span>42ms</span></span>
          </div>
        </div>

        <div class="feed" role="img" aria-label="模拟无人机画面与检测框">
          <div class="scanline"></div>
          <div class="feed-vignette"></div>
          <div class="detections-layer">
            <div class="box box-1" data-label="person 0.94"></div>
            <div class="box box-2" data-label="vehicle 0.88"></div>
            <div class="box box-3" data-label="sign 0.76"></div>
          </div>
          <div class="crosshair" aria-hidden="true"></div>
        </div>

        <div class="feed-footer">
          <div class="timeline" aria-hidden="true"><div class="timeline-fill"></div></div>
          <span class="coords">31.2304° N · 121.4737° E · ALT 120m</span>
        </div>
      </section>

      <aside>
        <div class="aside-head">
          <h2 class="aside-title">检测目标</h2>
          <p class="aside-desc">当前帧内模型输出与置信度。样式演示，无真实推理。</p>
        </div>
        <div class="filters">
          <span class="chip on">全部</span>
          <span class="chip">人员</span>
          <span class="chip">载具</span>
          <span class="chip">设施</span>
        </div>
        <div class="list">
          <article class="card">
            <div class="card-top">
              <span class="card-name">行人</span>
              <span class="card-id">#D-1042</span>
            </div>
            <div class="meter"><div class="meter-fill" style="width: 94%"></div></div>
            <div class="meta-row">
              <span>置信度</span>
              <span>0.94</span>
            </div>
          </article>
          <article class="card">
            <div class="card-top">
              <span class="card-name">汽车</span>
              <span class="card-id">#D-1043</span>
            </div>
            <div class="meter"><div class="meter-fill" style="width: 88%"></div></div>
            <div class="meta-row">
              <span>置信度</span>
              <span>0.88</span>
            </div>
          </article>
          <article class="card">
            <div class="card-top">
              <span class="card-name">路牌</span>
              <span class="card-id">#D-1044</span>
            </div>
            <div class="meter"><div class="meter-fill" style="width: 76%"></div></div>
            <div class="meta-row">
              <span>置信度</span>
              <span>0.76</span>
            </div>
          </article>
        </div>
        <div class="aside-foot">
          模型 <strong>YOLOv8n</strong> · 输入 640×640 · 仅前端展示
        </div>
      </aside>
    </main>

    <div class="metrics">
      <div class="metric">
        <span class="metric-label">今日帧数</span>
        <span class="metric-value">842,910</span>
      </div>
      <div class="metric">
        <span class="metric-label">平均推理</span>
        <span class="metric-value">12.4 ms</span>
      </div>
      <div class="metric">
        <span class="metric-label">活跃目标</span>
        <span class="metric-value">3</span>
      </div>
      <div class="metric">
        <span class="metric-label">链路质量</span>
        <span class="metric-value" style="color: var(--accent)">优</span>
      </div>
    </div>
  </div>
</body>
</html>
